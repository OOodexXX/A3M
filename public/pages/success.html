<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تم الطلب بنجاح — A3M Print</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Cairo:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <!-- BUG FIX: المسار الصحيح من /pages/ -->
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .success-wrap{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:2rem}
    .success-card{background:var(--bg2);border-radius:20px;border:1px solid var(--border);padding:3rem 2.5rem;text-align:center;max-width:480px;width:100%}
    .success-icon{font-size:4rem;margin-bottom:1rem;animation:pop .5s ease}
    @keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
    .success-title{font-family:'Permanent Marker',cursive;font-size:2rem;margin-bottom:.5rem;color:var(--txt)}
    .success-sub{font-size:14px;color:var(--txt2);line-height:1.7;margin-bottom:2rem}
    .success-id{background:var(--bg3);border-radius:8px;padding:.6rem 1rem;font-size:12px;color:var(--txt3);margin-bottom:2rem;border:1px dashed var(--border2)}
    .btn-home{display:inline-block;background:var(--accent);color:#fff;border:none;padding:12px 28px;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px;font-family:inherit;text-decoration:none;transition:.2s}
    .btn-home:hover{background:var(--accent2)}
    .gold-line{height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.5rem auto;width:80px}
  </style>
</head>
<body class="blue-dark">

  <div class="success-wrap">
    <div class="success-card">
      <div class="success-icon">✅</div>
      <div class="success-title">
        A<span class="r">3</span><span class="g">M</span>
      </div>
      <div class="gold-line"></div>
      <h2 style="font-family:'Permanent Marker',cursive;font-size:1.4rem;color:var(--txt);margin-bottom:.75rem">
        تم استلام طلبك!
      </h2>
      <p class="success-sub">
        شكراً على ثقتك بـ A3M Print ✦<br>
        سيتواصل معك فريقنا خلال <strong>24 ساعة</strong><br>
        لتأكيد التفاصيل وتحديد موعد التسليم.
      </p>
      <!-- BUG FIX: رابط العودة الصحيح من /pages/ → ../ -->
      <a class="btn-home" href="../index.html">← العودة للمتجر</a>
    </div>
  </div>

  <script>
    // تطبيق الثيم المحفوظ
    const t = localStorage.getItem("a3m_theme") || "blue-dark";
    document.body.className = t;
  </script>
</body>
</html>
